name: Convert CSV to JSON

on:
  push:
    paths:
      - 'LeaveReport.csv'
      - 'AttendanceReport.csv'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install beautifulsoup4
      - name: Convert files
        run: |
          [ -f LeaveReport.csv ] && python3 convert_leave.py
          [ -f AttendanceReport.csv ] && python3 convert_attendance.py
      - name: Save JSON to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add leave_data.json attendance_data.json
          git diff --staged --quiet || git commit -m "Auto update JSON [skip ci]"
          git push

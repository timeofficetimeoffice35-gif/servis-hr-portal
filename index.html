<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Servis Tyres HR Portal</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#cc0000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Servis HR">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #b80000 0%, #cc0000 40%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }
    .logo-wrap {
      margin-bottom: 24px;
    }
    .logo-wrap img {
      height: 80px;
      object-fit: contain;
    }
    h1 {
      font-size: 1.1rem;
      color: #333;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .subtitle {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 32px;
    }
    .input-group {
      margin-bottom: 18px;
      text-align: left;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #333;
      transition: border 0.2s;
      outline: none;
      background: #fafafa;
    }
    input:focus {
      border-color: #cc0000;
      background: #fff;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #cc0000, #990000);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:active { transform: scale(0.98); opacity: 0.9; }
    .error-msg {
      color: #cc0000;
      font-size: 0.82rem;
      margin-top: 14px;
      padding: 10px;
      background: #fff0f0;
      border-radius: 8px;
      display: none;
    }
    .footer-note {
      margin-top: 24px;
      font-size: 0.72rem;
      color: #bbb;
    }
  </style>
</head>

    <h1>Employee Self Service</h1>
    <p class="subtitle">HR Portal · Servis Tyres</p>

    <div class="input-group">
      <label>Employee ID</label>
      <input type="text" id="empId" placeholder="Enter your Employee ID" autocomplete="off">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>
    <button class="btn-login" onclick="doLogin()">Login</button>
    <div class="error-msg" id="errorMsg">Invalid Employee ID or Password. Please try again.</div>
    <p class="footer-note">Password is same as your Employee ID</p>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    }

    async function doLogin() {
      const empId = document.getElementById('empId').value.trim();
      const password = document.getElementById('password').value.trim();
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';

      if (!empId || !password) {
        errEl.textContent = 'Please enter Employee ID and Password.';
        errEl.style.display = 'block'; return;
      }
      if (empId !== password) {
        errEl.textContent = 'Invalid credentials. Password must match Employee ID.';
        errEl.style.display = 'block'; return;
      }

      // Verify employee exists in leave data
      try {
        const res = await fetch('./leave_data.json');
        const data = await res.json();
        if (!data[empId]) {
          errEl.textContent = 'Employee ID not found in system.';
          errEl.style.display = 'block'; return;
        }
        sessionStorage.setItem('loggedEmpId', empId);
        sessionStorage.setItem('loggedEmpName', data[empId].emp_name);
        window.location.href = './dashboard.html';
      } catch(e) {
        errEl.textContent = 'Error connecting to data. Please try again.';
        errEl.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  </script>
